name: Caro AI Pipeline

# Trigger luồng CI/CD khi có code push hoặc pull request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # GIAI ĐOẠN 1: Continuous Integration (CI) - Chạy Test và Lint
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy mã nguồn
      uses: actions/checkout@v3

    - name: Cài đặt Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Cài đặt thư viện và công cụ ảo hóa hiển thị (xvfb)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # xvfb (X virtual framebuffer) cần thiết để chạy test Tkinter trên server không có màn hình
        sudo apt-get install -y xvfb 

    - name: Kiểm tra cú pháp với flake8
      run: |
        # Bắt các lỗi cú pháp nghiêm trọng
        flake8 core ai main.py --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Chạy Unit Test với pytest
      run: |
        xvfb-run pytest tests/

  # GIAI ĐOẠN 2: Continuous Deployment (CD) - Build file .exe
  build-windows:
    needs: test # Chỉ chạy build khi test đã pass
    runs-on: windows-latest # Dùng máy chủ Windows để build file .exe

    steps:
    - name: Lấy mã nguồn
      uses: actions/checkout@v3

    - name: Cài đặt Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build ứng dụng bằng PyInstaller
      run: |
        # --onefile: Gộp tất cả thành 1 file exe duy nhất
        # --windowed: Ẩn màn hình console (CMD) màu đen phía sau game
        pyinstaller --onefile --windowed --name CaroAI_v1.0 main.py

    - name: Upload File Thực Thi (Artifact)
      uses: actions/upload-artifact@v3
      with:
        name: CaroAI-Windows-Executable
        path: dist/CaroAI_v1.0.exe