name: Caro AI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Lấy mã nguồn
      uses: actions/checkout@v3

    - name: Cài đặt Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Cài đặt thư viện và công cụ ảo hóa hiển thị (xvfb)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        sudo apt-get install -y xvfb 

    - name: Kiểm tra cú pháp với flake8
      run: |
        flake8 core ai main.py --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Chạy Unit Test với pytest
      run: |
        xvfb-run pytest tests/

  build-windows:
    needs: test 
    runs-on: windows-latest 

    steps:
    - name: Lấy mã nguồn
      uses: actions/checkout@v3

    - name: Cài đặt Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Cài đặt thư viện
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build ứng dụng bằng PyInstaller
      run: |
        pyinstaller --onefile --windowed --name CaroAI_v1.0 main.py

    - name: Upload File Thực Thi (Artifact)
      uses: actions/upload-artifact@v3
      with:
        name: CaroAI-Windows-Executable
        path: dist/CaroAI_v1.0.exe